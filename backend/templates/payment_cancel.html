<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #fef2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .cancel-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            padding: 32px;
            text-align: center;
        }
        
        .cancel-icon {
            width: 80px;
            height: 80px;
            background-color: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .cancel-icon svg {
            width: 40px;
            height: 40px;
            stroke: white;
        }
        
        .cancel-title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .cancel-message {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 24px;
        }
        
        .error-details {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .error-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .error-label {
            color: #64748b;
        }
        
        .error-value {
            color: #dc2626;
            font-weight: 500;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
        }
        
        .retry-button {
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .retry-button:hover {
            background-color: #dc2626;
        }
        
        .cancel-button {
            background-color: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .cancel-button:hover {
            background-color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="cancel-container">
        <div class="cancel-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
        
        <h1 class="cancel-title">Payment Cancelled</h1>
        <p class="cancel-message">Your payment was cancelled or failed to process.</p>
        
        <div class="error-details">
            <div class="error-row">
                <span class="error-label">Error Code:</span>
                <span class="error-value" id="error-code">CANCELLED</span>
            </div>
            <div class="error-row">
                <span class="error-label">Amount:</span>
                <span class="error-value" id="payment-amount">₹{{ amount|default:"0" }}</span>
            </div>
            <div class="error-row">
                <span class="error-label">Business ID:</span>
                <span class="error-value" id="business-id">{{ business_id|default:"N/A" }}</span>
            </div>
        </div>
        
        <div class="button-group">
            <button class="retry-button" onclick="handleRetry()">Try Again</button>
            <button class="cancel-button" onclick="handleCancel()">Go Back</button>
        </div>
    </div>

    <script>
        // Platform Detection
        function detectPlatform() {
            const urlParams = new URLSearchParams(window.location.search);
            const platformParam = urlParams.get('platform');

            // Check URL parameter first
            if (platformParam === 'android' || platformParam === 'webview') {
                return 'android';
            }

            // Check User Agent for WebView indicators
            const userAgent = navigator.userAgent.toLowerCase();
            const isAndroidWebView = userAgent.includes('wv') ||
                userAgent.includes('version') && userAgent.includes('chrome') && userAgent.includes('mobile') ||
                window.AndroidInterface !== undefined ||
                window.webkit?.messageHandlers !== undefined;

            return isAndroidWebView ? 'android' : 'web';
        }

        // Configuration
        const BASE_URL = window.location.protocol + '//' + window.location.host;
        const PLATFORM = detectPlatform();

        const CONFIG = {
            PAYMENT_SUCCESS_URL: BASE_URL + '/kirazee/consumer/payment/success/',
            PAYMENT_FAILURE_URL: BASE_URL + '/kirazee/consumer/payment/failure/',
            ORDERS_URL: BASE_URL + '/kirazee/consumer/orders/',
            PLATFORM: PLATFORM
        };

        // Extract URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Platform-specific redirection handler
        function handleRedirection(type, data = {}) {
            if (CONFIG.PLATFORM === 'android') {
                // For Android WebView - use custom schemes or postMessage
                try {
                    // Try Android Interface first
                    if (window.AndroidInterface && window.AndroidInterface.handleRedirection) {
                        window.AndroidInterface.handleRedirection(type, JSON.stringify(data));
                        return;
                    }

                    // Try WebKit message handler (for hybrid apps)
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.redirection) {
                        window.webkit.messageHandlers.redirection.postMessage({
                            type: type,
                            data: data
                        });
                        return;
                    }

                    // Fallback to custom URL scheme
                    const customUrl = `kirazee://payment/${type}?${new URLSearchParams(data).toString()}`;
                    window.location.href = customUrl;

                } catch (error) {
                    console.error('Android redirection failed:', error);
                    // Fallback to web redirection
                    handleWebRedirection(type);
                }
            } else {
                // For web browser
                handleWebRedirection(type);
            }
        }

        function handleWebRedirection(type) {
            switch (type) {
                case 'orders':
                    window.location.href = CONFIG.ORDERS_URL;
                    break;
                case 'success':
                    window.location.href = CONFIG.PAYMENT_SUCCESS_URL;
                    break;
                case 'failure':
                    window.location.href = CONFIG.PAYMENT_FAILURE_URL;
                    break;
                default:
                    window.location.href = CONFIG.ORDERS_URL;
            }
        }
        
        // Get payment details from URL
        const errorCode = getUrlParameter('error_code') || getUrlParameter('code') || 'CANCELLED';
        const errorMessage = getUrlParameter('error') || getUrlParameter('message') || 'Payment was cancelled';
        const amount = getUrlParameter('amount') || '{{ amount|default:"0" }}';
        const businessId = getUrlParameter('business_id') || '{{ business_id|default:"" }}';
        
        // Update error details
        if (errorCode) {
            document.getElementById('error-code').textContent = errorCode;
        }
        if (amount) {
            document.getElementById('payment-amount').textContent = '₹' + amount;
        }
        if (businessId) {
            document.getElementById('business-id').textContent = businessId;
        }
        
        // Android callback for retry
        function handleRetry() {
            console.log('Retry button clicked');
            
            // Use the comprehensive redirection handler
            handleRedirection('retry', {
                error_code: errorCode,
                error_message: errorMessage,
                amount: amount,
                business_id: businessId
            });
        }
        
        // Android callback for cancel
        function handleCancel() {
            console.log('Cancel button clicked');
            
            // Use the comprehensive redirection handler
            handleRedirection('failure', {
                error_code: errorCode,
                error_message: errorMessage,
                amount: amount,
                business_id: businessId
            });
        }
        
        // Auto-trigger callback after a short delay for WebView
        setTimeout(() => {
            if (window.androidInterface || window.AndroidInterface || window.webkit) {
                handleCancel();
            }
        }, 3000);
        
        // WebView specific handling
        if (window.ReactNativeWebView) {
            // Handle messages from React Native
            window.addEventListener('message', function (event) {
                if (event.data.type === 'PAYMENT_FAILURE') {
                    handleCancel();
                }
            });
        }
        
        // Log for debugging
        console.log('Payment cancel page loaded');
        console.log('Error Code:', errorCode);
        console.log('Error Message:', errorMessage);
        console.log('Amount:', amount);
        console.log('Business ID:', businessId);
    </script>
</body>
</html>
