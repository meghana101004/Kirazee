<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Razorpay</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
                font-size: 13px;
            }
        }

        .payment-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 24px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .payment-container {
                padding: 16px;
                border-radius: 8px;
            }
        }

        @media (max-width: 360px) {
            .payment-container {
                padding: 12px;
            }
        }

        .payment-header {
            margin-bottom: 24px;
        }

        .payment-logo {
            width: 80px;
            margin-bottom: 12px;
        }

        @media (max-width: 480px) {
            .payment-logo {
                width: 60px;
                margin-bottom: 8px;
            }
        }

        .payment-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }

        @media (max-width: 480px) {
            .payment-title {
                font-size: 16px;
            }
        }

        .payment-description {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .payment-description {
                font-size: 12px;
                margin-bottom: 16px;
            }
        }

        .payment-amount {
            background-color: #f1f5f9;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .payment-amount {
                padding: 12px;
                margin-bottom: 16px;
            }
        }

        .amount-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .amount-value {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
        }

        @media (max-width: 480px) {
            .amount-value {
                font-size: 20px;
            }
        }

        .payment-button {
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
        }

        @media (max-width: 480px) {
            .payment-button {
                padding: 10px 16px;
                font-size: 14px;
                min-height: 44px;
            }
        }

        .payment-button:hover {
            background-color: #4338ca;
        }

        .payment-button:active {
            background-color: #3730a3;
        }

        .payment-footer {
            margin-top: 20px;
            font-size: 11px;
            color: #94a3b8;
        }

        @media (max-width: 480px) {
            .payment-footer {
                margin-top: 16px;
                font-size: 10px;
            }
        }

        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 12px;
            color: #64748b;
        }

        @media (max-width: 480px) {
            .secure-badge {
                font-size: 11px;
                margin-top: 8px;
            }
        }

        .payment-features {
            margin-top: 20px;
            text-align: left;
        }

        @media (max-width: 480px) {
            .payment-features {
                margin-top: 16px;
            }
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #475569;
        }

        @media (max-width: 480px) {
            .feature-item {
                font-size: 12px;
                margin-bottom: 8px;
                gap: 6px;
            }
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            max-width: 90vw;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            .popup-content {
                padding: 16px;
                border-radius: 6px;
            }
        }

        .popup-button {
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .popup-button:hover {
            background-color: #4338ca;
        }
    </style>
</head>

<body>
    <div class="payment-container">
        <div class="payment-header">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px;">
                <img src="https://razorpay.com/assets/razorpay-logo.svg" alt="Razorpay" class="payment-logo"
                    style="margin-bottom: 0;">
                <button type="button" onclick="window.location.reload(true)" title="Refresh Page"
                    style="background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #64748b; padding: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>
            <h1 class="payment-title">Complete Your Payment</h1>
            <p class="payment-description">Secure payment processed by Razorpay</p>
        </div>

        <div class="payment-amount">
            <div class="amount-label">Total Amount</div>
            <div class="amount-value">₹{{ amount }}</div>
        </div>

        <button id="rzp-button1" class="payment-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            Proceed to Pay
        </button>

        <div class="payment-features">
            <div class="feature-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Secure SSL Encryption
            </div>
            <div class="feature-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Multiple Payment Options
            </div>
            <div class="feature-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Instant Payment Confirmation
            </div>
        </div>

        <div class="payment-footer">
            <p>You'll be redirected to Razorpay's secure payment page</p>
            <div class="secure-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                100% Secure Payments
            </div>
        </div>
    </div>

    <div id="custom-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <p id="popup-message"></p>
            <button id="popup-ok-button" class="popup-button">OK</button>
        </div>
    </div>

    <script>
        // Verify Razorpay script is loaded
        function checkRazorpayLoaded() {
            if (typeof Razorpay === 'undefined') {
                console.error('Razorpay script not loaded');
                showPopupMessage('Payment gateway loading failed. Please refresh the page.');
                return false;
            }
            console.log('Razorpay script loaded successfully');
            console.log('Razorpay version:', typeof Razorpay);
            return true;
        }

        // Enhanced WebView detection
        function detectWebView() {
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const hasAndroidInterface = window.androidInterface || window.AndroidInterface;
            const hasIOSInterface = window.webkit && window.webkit.messageHandlers;

            console.log('Device detection:', {
                userAgent: navigator.userAgent,
                isAndroid: isAndroid,
                isIOS: isIOS,
                hasAndroidInterface: !!hasAndroidInterface,
                hasIOSInterface: !!hasIOSInterface
            });

            return {
                isWebView: hasAndroidInterface || hasIOSInterface,
                isAndroid: isAndroid,
                isIOS: isIOS,
                hasAndroidInterface: !!hasAndroidInterface,
                hasIOSInterface: !!hasIOSInterface
            };
        }

        var businessIdFromContext = '{{ business_id|escapejs }}';
        var userIdFromContext = '{{ user_id|escapejs }}';

        // Wait for Razorpay to be available
        function initializePayment() {
            if (!checkRazorpayLoaded()) {
                setTimeout(initializePayment, 1000);
                return;
            }

            console.log('Razorpay loaded, initializing payment...');

            // Enhanced WebView detection
            const webviewInfo = detectWebView();
            const IS_WEBVIEW = webviewInfo.isWebView;
            const IS_LIVE_MODE = '{{ razorpay_mode|default:"test" }}' === 'live';

            console.log('WebView detected:', IS_WEBVIEW);
            console.log('Platform:', webviewInfo.isAndroid ? 'Android' : webviewInfo.isIOS ? 'iOS' : 'Web');
            console.log('Live mode:', IS_LIVE_MODE);

            const RAZORPAY_KEY_ID = '{{ razorpay_key|default:"rzp_live_RWVzTgqHj7oJwO" }}';
            const BUSINESS_NAME = '{{ business_name|default:"Kirazee" }}';
            const ORDER_ID = '{{ order_id|default:"" }}';
            const SUCCESS_URL = '{{ success_url|default:"" }}';
            const CANCEL_URL = '{{ cancel_url|default:"" }}';

            // WebView-compatible options
            var options = {
                key: RAZORPAY_KEY_ID,
                amount: "{{ amount }}00",
                currency: "INR",
                name: BUSINESS_NAME,
                order_id: ORDER_ID || undefined,
                handler: function (response) {
                    console.log('Payment successful:', response);

                    // Send payment data to backend
                    sendPaymentResultToBackend(response, 'success');

                    // Show success message
                    showPopupMessage("Payment successful! Redirecting...");

                    // For WebView, trigger Android callback
                    if (IS_WEBVIEW) {
                        setTimeout(() => {
                            if (window.androidInterface && typeof window.androidInterface.onPaymentResult === 'function') {
                                window.androidInterface.onPaymentResult('success', response.razorpay_payment_id);
                            } else if (window.AndroidInterface && typeof window.AndroidInterface.onPaymentResult === 'function') {
                                window.AndroidInterface.onPaymentResult('success', response.razorpay_payment_id);
                            } else {
                                // Fallback: redirect to success page
                                window.location.href = SUCCESS_URL + '&razorpay_payment_id=' + response.razorpay_payment_id;
                            }
                        }, 2000);
                    } else {
                        // For web browsers, redirect to success page
                        setTimeout(() => {
                            window.location.href = SUCCESS_URL + '&razorpay_payment_id=' + response.razorpay_payment_id;
                        }, 2000);
                    }
                },
                prefill: {
                    name: "Customer Name",
                    email: "customer@example.com",
                    contact: "7075787677"
                },
                theme: {
                    color: "#4f46e5"
                },
                modal: {
                    ondismiss: function () {
                        console.log('Payment modal dismissed');
                        if (IS_WEBVIEW) {
                            // Trigger Android callback for cancellation
                            if (window.androidInterface && typeof window.androidInterface.onPaymentResult === 'function') {
                                window.androidInterface.onPaymentResult('cancelled', 'User cancelled payment');
                            } else if (window.AndroidInterface && typeof window.AndroidInterface.onPaymentResult === 'function') {
                                window.AndroidInterface.onPaymentResult('cancelled', 'User cancelled payment');
                            } else {
                                window.location.href = CANCEL_URL;
                            }
                        } else {
                            window.location.href = CANCEL_URL;
                        }
                    },
                    escape: true,
                    handleback: true,
                    confirm_close: true,
                    animation: 'fade'
                }
            };

            // For WebView, disable external apps in test mode
            if (IS_WEBVIEW && !IS_LIVE_MODE) {
                options.external = {
                    wallets: false,
                    upi: true,
                    card: true,
                    netbanking: true
                };
            }

            console.log('Razorpay options configured:', {
                key: options.key,
                amount: options.amount,
                hasHandler: !!options.handler,
                hasModal: !!options.modal
            });

            // Store options globally for button click
            window.rzpOptions = options;
            window.__razorpayOptions = options; // For WebView compatibility
            console.log('Razorpay options stored globally');

            // 🔥 FORCE create instance for WebView
            try {
                window.__rzp = new Razorpay(window.__razorpayOptions);
                console.log('Forced Razorpay instance created for WebView');

                // 2. Force modal (not popup)
                window.__rzp.preferences = {
                    redirect: true,
                    back: true,
                    skip_popup_blocker_detection: true
                };
                console.log('WebView modal preferences set');

                // Add error handling to forced instance
                window.__rzp.on('payment.failed', function (response) {
                    console.error('Payment failed (forced instance):', response);

                    // Send failure data to backend
                    const failedData = {
                        razorpay_payment_id: response.error.metadata?.payment_id || 'failed',
                        amount: window.__razorpayOptions.amount / 100,
                        error: response.error.description || 'Payment failed'
                    };

                    sendPaymentResultToBackend(failedData, 'failed');

                    // Show error message
                    showPopupMessage("Payment failed: " + response.error.description);

                    // For WebView, trigger Android callback
                    const webviewInfo = detectWebView();
                    if (webviewInfo.isWebView) {
                        setTimeout(() => {
                            if (window.androidInterface && typeof window.androidInterface.onPaymentResult === 'function') {
                                window.androidInterface.onPaymentResult('failed', response.error.description);
                            } else if (window.AndroidInterface && typeof window.AndroidInterface.onPaymentResult === 'function') {
                                window.AndroidInterface.onPaymentResult('failed', response.error.description);
                            }
                        }, 2000);
                    }
                });

            } catch (err) {
                console.error('Unable to create Razorpay instance:', err);
            }

            // 3. Remove old onclick listeners (clear conflicts)
            setTimeout(() => {
                let btn = document.getElementById('rzp-button1');
                if (btn) {
                    console.log('Clearing existing button listeners...');
                    btn.replaceWith(btn.cloneNode(true));
                    btn = document.getElementById('rzp-button1');

                    // 4. Attach WebView-safe click handler
                    btn.onclick = function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        console.log('Proceed button clicked - opening Razorpay from WebView');

                        if (window.__rzp && typeof window.__rzp.open === 'function') {
                            try {
                                console.log('WebView payment triggered');
                                window.__rzp.open();
                            } catch (err) {
                                console.error('Razorpay open error:', err);
                                showPopupMessage('Unable to open payment gateway. Please try again.');
                            }
                        } else {
                            console.error('Razorpay instance not available');
                            showPopupMessage('Payment gateway not ready. Please wait and try again.');
                        }
                    };

                    console.log('WebView click handler attached');
                } else {
                    console.error('Payment button not found');
                }
            }, 100);
        }

        function onButtonClick() {
            console.log("Attempting to call Android interface...");

            // Try multiple interface naming conventions for compatibility
            const interfaces = [
                { name: 'androidInterface', method: 'goToNextScreen' },
                { name: 'AndroidInterface', method: 'goToNextScreen' },
                { name: 'androidInterface', method: 'handlePaymentSuccess' },
                { name: 'AndroidInterface', method: 'handlePaymentSuccess' }
            ];

            for (const interfaceObj of interfaces) {
                if (window[interfaceObj.name] && typeof window[interfaceObj.name][interfaceObj.method] === 'function') {
                    try {
                        window[interfaceObj.name][interfaceObj.method]();
                        console.log(`Successfully called window.${interfaceObj.name}.${interfaceObj.method}()`);
                        return;
                    } catch (e) {
                        console.error(`Error calling window.${interfaceObj.name}.${interfaceObj.method}: `, e);
                    }
                }
            }

            console.warn("No Android interface method found. Available interfaces:", Object.keys(window).filter(key => key.toLowerCase().includes('android')));

            // Fallback: try to close the WebView or navigate back
            if (window.history && window.history.length > 1) {
                console.log("Attempting to navigate back...");
                window.history.back();
            } else {
                console.log("No navigation history available, staying on page.");
                showPopupMessage('Payment completed! You can close this window.');
            }
        }

        function showPopupMessage(message) {
            const popup = document.getElementById('custom-popup');
            const messageElement = document.getElementById('popup-message');
            const okButton = document.getElementById('popup-ok-button');

            messageElement.textContent = message;
            popup.style.display = 'flex';

            okButton.onclick = function () {
                popup.style.display = 'none';
            };
        }

        function sendPaymentResultToBackend(data, status) {
            let payment_method = data.razorpay_method || data.method;
            let upi_id = data.razorpay_vpa || data.vpa;

            const backendStatus = status === 'success' ? 'captured' : 'failed';

            // Use dynamic backend URL for better mobile compatibility
            const backendUrl = window.location.origin + '/kirazee/business/save-payment-data/';

            fetch(backendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    transaction_id: data.razorpay_payment_id || 'no_txn_id',
                    amount: Number(options.amount) / 100,
                    currency: 'INR',
                    payment_method: payment_method,
                    status: backendStatus,
                    upi_id: upi_id,
                    business_id: businessIdFromContext,
                    user_id: userIdFromContext,
                })
            })
                .then(res => res.json())
                .then(result => {
                    if (result.status === 'success') {
                        showPopupMessage('Congratulations! Your business has been successfully created');
                        onButtonClick();
                    } else {
                        showPopupMessage('Failed to save payment result!');
                    }
                })
                .catch(() => {
                    showPopupMessage('Failed to save payment result!');
                });
        }

        // Initialize payment when page loads
        document.addEventListener('DOMContentLoaded', function () {
            console.log('DOM loaded, checking Razorpay...');
            initializePayment();
        });

        // Also initialize if DOM is already loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializePayment);
        } else {
            initializePayment();
        }

        // ⚠️ REMOVED: Old button click handlers - now handled in initializePayment
        // This prevents conflicts with WebView-safe handler

        // ⚠️ REMOVED: Old event listeners - now handled in initializePayment
        // This prevents conflicts with WebView-safe handler

        // 🧪 MINIMUM PATCH FIX - Force create instance after delay
        setTimeout(() => {
            try {
                if (window.Razorpay && window.__razorpayOptions && !window.__rzp) {
                    window.__rzp = new Razorpay(window.__razorpayOptions);
                    console.log('WebView Razorpay instance initialized via patch');

                    // Add error handling to patched instance
                    window.__rzp.on('payment.failed', function (response) {
                        console.error('Payment failed (patched instance):', response);
                        // Additional error handling can be added here
                    });
                }
            } catch (err) {
                console.error('Forced instance error (patch):', err);
            }
        }, 500);

        // Detect if running in WebView
        if (window.webkit && window.webkit.messageHandlers) {
            console.log('Running in iOS WebView');
        } else if (window.androidInterface || window.AndroidInterface) {
            console.log('Running in Android WebView');
        } else {
            console.log('Running in regular browser');
        }

        // Add debugging function to check Razorpay status
        function debugRazorpayStatus() {
            const webviewInfo = detectWebView();
            console.log('=== Razorpay Debug Info ===');
            console.log('Razorpay object available:', typeof Razorpay !== 'undefined');
            console.log('Global options available:', !!window.rzpOptions);
            console.log('WebView options available:', !!window.__razorpayOptions);
            console.log('Forced instance available:', !!window.__rzp);
            console.log('Forced instance has open method:', !!(window.__rzp && typeof window.__rzp.open === 'function'));
            console.log('WebView detected:', webviewInfo.isWebView);
            console.log('Platform:', webviewInfo.isAndroid ? 'Android' : webviewInfo.isIOS ? 'iOS' : 'Web');
            console.log('Button element:', !!document.getElementById('rzp-button1'));
            console.log('Button onclick type:', typeof document.getElementById('rzp-button1').onclick);
            console.log('Touch events supported:', 'ontouchstart' in window);
            console.log('==========================');
        }

        // Call debug function after initialization
        setTimeout(debugRazorpayStatus, 2000);

        // Also make it available globally for manual debugging
        window.debugRazorpay = debugRazorpayStatus;

        // Add manual trigger for testing (uses WebView-safe handler)
        window.testPayment = function () {
            console.log('Manual payment test triggered');
            const button = document.getElementById('rzp-button1');
            if (button && button.onclick) {
                button.onclick(new Event('click'));
            } else {
                console.error('Payment button or handler not found');
            }
        };

        // Add manual trigger for forced instance
        window.testForcedPayment = function () {
            console.log('Testing forced Razorpay instance...');
            if (window.__rzp && typeof window.__rzp.open === 'function') {
                console.log('Opening forced instance...');
                window.__rzp.open();
            } else {
                console.error('Forced instance not available');
            }
        };
    </script>
</body>

</html>
