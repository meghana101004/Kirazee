<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Complete Your Payment - Kirazee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe0b3 25%, #ffcc80 50%, #f55d00 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .payment-container {
            background: #ffffff;
            border-radius: 16px;
            border-top: 4px solid #f55d00;
            max-width: 400px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }


        .payment-container.error-state {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #f55d00;
            letter-spacing: -0.8px;
            margin-bottom: 40px;
        }

        .payment-status {
            margin-bottom: 40px;
        }

        .status-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.3),
                0 4px 12px rgba(245, 93, 0, 0.2);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .status-icon::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: linear-gradient(90deg, rgba(245, 93, 0, 0.1), rgba(255, 138, 0, 0.1));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-icon:hover::before {
            opacity: 1;
        }

        .status-icon.loading {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.3),
                0 4px 16px rgba(245, 93, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-icon.loading svg {
            fill: white;
        }

        .status-icon.success {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.3),
                0 4px 16px rgba(245, 93, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            animation: successPulse 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes successPulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .status-icon.success svg {
            fill: #1e293b;
        }

        .status-icon.error {
            background: #ef4444;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 12px 32px rgba(239, 68, 68, 0.3),
                0 4px 16px rgba(239, 68, 68, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .status-icon.error svg {
            fill: white;
        }

        .status-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
            letter-spacing: -0.5px;
            line-height: 1.3;
            animation: fadeInDown 0.6s ease-out 0.2s both;
        }

        .status-message {
            font-size: 16px;
            color: #334155;
            line-height: 1.5;
            font-weight: 400;
            margin-bottom: 32px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }


        .progress-bar {
            width: 100%;
            max-width: 280px;
            height: 4px;
            background: #F4F4F8;
            border-radius: 2px;
            margin: 24px auto;
            overflow: hidden;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            border-radius: 2px;
            animation: progressMove 2s ease-in-out infinite;
        }

        @keyframes progressMove {
            0% {
                width: 0%;
            }

            50% {
                width: 70%;
            }

            100% {
                width: 100%;
            }
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }

        .progress-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(74, 144, 226, 0.3);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .progress-dots .dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        .progress-dots .dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {

            0%,
            100% {
                background: rgba(74, 144, 226, 0.3);
                transform: scale(1);
            }

            50% {
                background: #f55d00;
                transform: scale(1.2);
            }
        }

        .warning-message {
            background: transparent;
            color: #475569;
            padding: 0;
            border: none;
            margin: 16px auto 0;
            font-size: 14px;
            font-weight: 400;
            text-align: center;
        }



        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 8px 4px;
            min-width: 160px;
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.3),
                0 2px 8px rgba(245, 93, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .btn:hover {
            background: linear-gradient(90deg, #ff8a00, #f55d00);
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.4),
                0 4px 16px rgba(245, 93, 0, 0.3);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-container {
            text-align: center;
            max-width: 100%;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Removed orange line from error container */
        .error-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
            border-radius: 28px 28px 0 0;
        }

        @keyframes shimmer {

            0%,
            100% {
                background-position: 200% 0;
            }

            50% {
                background-position: -200% 0;
            }
        }

        .error-container .status-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            background: rgba(239, 68, 68, 0.1);
            border: 3px solid rgba(239, 68, 68, 0.2);
            position: relative;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
            }
        }

        .error-container .status-icon::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ef4444, #f55d00, #ff8a00);
            background-size: 200% 200%;
            z-index: -1;
            opacity: 0.2;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                transform: rotate(360deg);
                background-position: 0% 50%;
            }
        }

        .error-container .status-icon svg {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-2px);
            }

            75% {
                transform: translateX(2px);
            }
        }

        .error-container .status-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            animation: fadeInDown 0.6s ease-out 0.2s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-container .status-message {
            font-size: 16px;
            color: #334155;
            opacity: 0.85;
            line-height: 1.6;
            margin-bottom: 36px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 36px;
            flex-wrap: wrap;
            text-transform: none;
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        .btn-primary {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.35),
                0 2px 8px rgba(245, 93, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 160px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            transition: width 0.4s ease;
            z-index: -1;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(245, 93, 0, 0.4);
            background: linear-gradient(90deg, #ff8a00, #f55d00);
        }

        .btn-secondary {
            background: rgba(248, 250, 252, 0.9);
            color: #1e293b;
            border: 2px solid rgba(30, 41, 59, 0.3);
            padding: 16px 36px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 160px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            transition: width 0.4s ease;
            z-index: -1;
        }

        .btn-secondary:hover::before {
            width: 100%;
        }

        .btn-secondary:hover {
            color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(245, 93, 0, 0.3);
            border-color: #f55d00;
        }

        .footer-text {
            font-size: 11px;
            color: #475569;
            opacity: 0.6;
            margin-top: 44px;
            text-align: center;
            font-weight: 400;
            animation: fadeIn 0.6s ease-out 1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 0.6;
            }
        }

        .security-info-error {
            font-size: 12px;
            color: #475569;
            opacity: 0.7;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        .security-info-error svg {
            width: 16px;
            height: 16px;
            fill: #f55d00;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 2px rgba(245, 93, 0, 0.3));
            }

            to {
                filter: drop-shadow(0 0 6px rgba(245, 93, 0, 0.6));
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.05);
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            border-left: 4px solid #ef4444;
            font-size: 14px;
        }

        .success-message {
            background: rgba(245, 93, 0, 0.1);
            color: #1e293b;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            border-left: 4px solid #f55d00;
            font-size: 14px;
        }

        /* Success State Styles */
        .success-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f55d00, #ff8a00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow:
                0 8px 32px rgba(245, 93, 0, 0.3),
                0 4px 16px rgba(245, 93, 0, 0.2);
            animation: successBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .success-icon-large svg {
            width: 32px;
            height: 32px;
        }

        @keyframes successBounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            line-height: 1.2;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .success-message {
            font-size: 14px;
            color: #334155;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.6s ease-out 0.4s both;
            background: none;
            border: none;
            padding: 0;
        }

        .success-btn {
            background: linear-gradient(135deg, #f55d00, #ff8a00);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 200px;
            box-shadow:
                0 4px 16px rgba(245, 93, 0, 0.3),
                0 2px 8px rgba(245, 93, 0, 0.2);
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        .success-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.4),
                0 4px 12px rgba(245, 93, 0, 0.3);
            background: linear-gradient(135deg, #ff8a00, #f55d00);
        }

        .success-btn:active {
            transform: translateY(0);
        }

        .security-info {
            font-size: 14px;
            color: #f55d00;
            margin-top: 24px;
            padding: 12px 16px;
            background: rgba(245, 93, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(245, 93, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.6s ease-out 1s both;
        }

        .security-icon {
            width: 16px;
            height: 16px;
            fill: #f55d00;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.1);
            color: #d97706;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .status-confirmed {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* Enhanced Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(245, 93, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(245, 93, 0, 0.6);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        /* Interactive Elements */
        .interactive-element {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .interactive-element:hover {
            transform: translateY(-2px);
        }

        .interactive-element:active {
            transform: translateY(0);
        }

        /* Mobile First Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .payment-container {
                padding: 32px 24px;
                margin: 0 auto;
                border-radius: 20px;
                max-width: 100%;
                width: 100%;
                backdrop-filter: blur(15px);
            }

            .logo-container {
                margin-bottom: 28px;
            }

            .logo {
                font-size: 28px;
            }

            .status-title {
                font-size: 26px;
                margin-bottom: 12px;
            }

            .status-message {
                font-size: 16px;
                margin-bottom: 24px;
            }

            .status-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 24px;
            }

            .status-icon svg {
                width: 40px;
                height: 40px;
            }

            .progress-bar {
                max-width: 250px;
                height: 5px;
                margin: 20px auto;
            }



            .success-icon-large {
                width: 64px;
                height: 64px;
                margin-bottom: 24px;
            }

            .success-icon-large svg {
                width: 24px;
                height: 24px;
            }

            .success-title {
                font-size: 22px;
                margin-bottom: 12px;
            }

            .success-message {
                font-size: 14px;
                margin-bottom: 32px;
                max-width: 280px;
            }

            .success-btn {
                width: 100%;
                padding: 14px 24px;
                font-size: 15px;
                min-width: auto;
            }

            .btn:active {
                transform: scale(0.98);
            }

            .button-container {
                flex-direction: row;
                gap: 12px;
                margin-top: 24px;
            }

            .error-container {
                padding: 24px 20px;
                margin: 16px auto;
                border-radius: 16px;
            }

            .error-container .status-icon {
                width: 64px;
                height: 64px;
                margin-bottom: 16px;
            }

            .error-container .status-title {
                font-size: 22px;
                margin-bottom: 8px;
            }

            .error-container .status-message {
                font-size: 14px;
                margin-bottom: 24px;
                max-width: 100%;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                padding: 14px 24px;
                font-size: 15px;
                min-width: auto;
            }

            .security-info-error {
                font-size: 11px;
                margin-top: 20px;
                padding-top: 16px;
            }

            .footer-text {
                margin-top: 32px;
                font-size: 10px;
            }

            .security-info {
                font-size: 11px;
                padding: 12px 8px;
                margin-top: 20px;
                padding-top: 12px;
            }

            .security-icon {
                width: 12px;
                height: 12px;
            }
        }

        /* Touch-friendly interactions */
        @media (hover: none) and (pointer: coarse) {
            .btn:hover {
                transform: none;
                background: linear-gradient(135deg, #f55d00, #ff8a00);

    <script>
        // Platform Detection
        function detectPlatform() {
            const urlParams = new URLSearchParams(window.location.search);
            const platformParam = urlParams.get('platform');

            // Check URL parameter first
            if (platformParam === 'android' || platformParam === 'webview') {
                return 'android';
            }

            // Check User Agent for WebView indicators
            const userAgent = navigator.userAgent.toLowerCase();
            const isAndroidWebView = userAgent.includes('wv') ||
                userAgent.includes('version') && userAgent.includes('chrome') && userAgent.includes('mobile') ||
                window.AndroidInterface !== undefined ||
                window.webkit?.messageHandlers !== undefined;

            return isAndroidWebView ? 'android' : 'web';
        }

        // Configuration
        const BASE_URL = window.location.protocol + '//' + window.location.host;
        const PLATFORM = detectPlatform();

        const CONFIG = {

            PAYMENT_VERIFY_URL: BASE_URL + '/kirazee/consumer/payment/callback/',
            PAYMENT_SUCCESS_URL: BASE_URL + '/kirazee/consumer/payment/success/',
            PAYMENT_FAILURE_URL: BASE_URL + '/kirazee/consumer/payment/failure/',

            // Add progress elements for loading state
            if (type === 'loading') {
                // Add progress bar if it doesn't exist
                if (!paymentStatus.querySelector('.progress-bar')) {
                    const progressBar = document.createElement('div');
                    progressBar.className = 'progress-bar';
                    paymentStatus.appendChild(progressBar);
                }


            }
        }

            // Append all elements
            paymentStatus.appendChild(successTitle);
            paymentStatus.appendChild(successMessage);
            paymentStatus.appendChild(countdownMessage);

            // Start countdown and auto-load order details after 3 seconds
            let countdown = 3;
            countdownMessage.textContent = `Loading order details in ${countdown} seconds...`;

            const countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    countdownMessage.textContent = `Loading order details in ${countdown} seconds...`;
                } else {
                    clearInterval(countdownInterval);
                    loadOrderDetails();
                }
            }, 1000);
        }

        async function loadOrderDetails() {
            const orderId = getOrderIdFromUrl();
            const userId = 14774; // This should ideally come from user session

            // Clear the payment status and show loading
            paymentStatus.innerHTML = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'status-message';
            loadingDiv.textContent = 'Loading order details...';
            loadingDiv.style.textAlign = 'center';
            loadingDiv.style.padding = '40px';
            paymentStatus.appendChild(loadingDiv);

            try {
                const response = await fetch(`${CONFIG.ORDERS_URL}${orderId}/?user_id=${userId}`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    displayOrderDetails(data.data);
                } else {
                    throw new Error('API returned success: false');
                }

                console.error('Error fetching order details:', error);
                paymentStatus.innerHTML = `

                    <strong>Error:</strong> Failed to load order details. 
                    <button class="btn" onclick="handleRedirection('orders')" style="margin-top: 15px;">
                        Go to Orders
                    </button>
                </div>
            `;

        // Platform-specific redirection handler
        function handleRedirection(type, data = {}) {
            if (CONFIG.PLATFORM === 'android') {
                // For Android WebView - use custom schemes or postMessage
                try {
                    // Try Android Interface first
                    if (window.AndroidInterface && window.AndroidInterface.handleRedirection) {
                        window.AndroidInterface.handleRedirection(type, JSON.stringify(data));
                        return;
                    }

                    // Try WebKit message handler (for hybrid apps)
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.redirection) {
                        window.webkit.messageHandlers.redirection.postMessage({
                            type: type,
                            data: data
                        });
                        return;
                    }

                    // Fallback to custom URL scheme
                    const customUrl = `kirazee://payment/${type}?${new URLSearchParams(data).toString()}`;
                    window.location.href = customUrl;

                } catch (error) {
                    console.error('Android redirection failed:', error);
                    // Fallback to web redirection
                    handleWebRedirection(type);
                }
            } else {
                // For web browser
                handleWebRedirection(type);
            }
        }

        function handleWebRedirection(type) {
            switch (type) {
                case 'orders':
                    window.location.href = CONFIG.ORDERS_URL;
                    break;
                case 'success':
                    window.location.href = CONFIG.PAYMENT_SUCCESS_URL;
                    break;
                case 'failure':
                    window.location.href = CONFIG.PAYMENT_FAILURE_URL;
                    break;
                default:
                    window.location.href = CONFIG.ORDERS_URL;
            }
        }

        // Payment verification function
        async function verifyPayment(razorpay_payment_id, razorpay_order_id, razorpay_signature) {
            try {
                updateStatus('verify', 'Verifying Payment', 'Please wait while we confirm your payment...');

                const response = await fetch(CONFIG.PAYMENT_VERIFY_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || 'dummy-token'
                    },
                    body: JSON.stringify({
                        razorpay_payment_id: razorpay_payment_id,
                        razorpay_order_id: razorpay_order_id,
                        razorpay_signature: razorpay_signature
                    })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    const orderId = getOrderIdFromUrl();
                    const confirmed = await pollForConfirmation(orderId);
                    if (confirmed) {
                        showSuccess('Payment verified and order Placed successfully!');
                    } else {
                        showSuccess('Payment received. Order confirmation will reflect shortly in your Orders.');
                    }
                } else {
                    showError(result.message || 'Payment verification failed');
                }
            } catch (error) {
                console.error('Payment verification error:', error);
                showError('Failed to verify payment. Please contact support.');
            }
        }

        async function pollForConfirmation(orderId, maxWaitMs = 1000, initialIntervalMs = 500) {
            try {
                const start = Date.now();
                let currentInterval = initialIntervalMs;
                let attempts = 0;

                while (Date.now() - start < maxWaitMs) {
                    try {
                        const res = await fetch(`${CONFIG.ORDERS_URL}${orderId}/?include_items=false`);
                        if (res.ok) {
                            const json = await res.json();
                            const status = ((json && json.data && json.data.status) || '').toLowerCase();
                            if ([
                                'confirmed', 'preparing', 'ready', 'assigned', 'picked_up', 'dispatched', 'travelling', 'out_for_delivery', 'delivered'
                            ].includes(status)) {
                                return true;
                            }
                        }
                    } catch (e) { }

                    // Exponential backoff: start fast, then slow down
                    // First 3 attempts: 500ms, then gradually increase to max 2000ms
                    attempts++;
                    if (attempts <= 3) {
                        currentInterval = initialIntervalMs;
                    } else {
                        currentInterval = Math.min(currentInterval * 1.3, 2000);
                    }

                    await new Promise(r => setTimeout(r, currentInterval));
                }
            } catch (e) { }
            return false;
        }

        // Helper to load Razorpay Script dynamically and ensure it's ready
        function loadRazorpayScript() {
            return new Promise((resolve) => {
                if (window.Razorpay) {
                    resolve(true);
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://checkout.razorpay.com/v1/checkout.js';
                script.onload = () => {
                    console.log('Razorpay Script Loaded Successfully');
                    resolve(true);
                };
                script.onerror = () => {
                    console.error('Failed to load Razorpay Script');
                    resolve(false);
                };
                document.body.appendChild(script);
            });
        }

        async function initiatePaymentOnServer(orderId) {
            try {
                updateStatus('payment', 'Connecting to Payment Gateway', 'Setting up your secure payment...');

                // 1. Fetch Order Data First
                console.log('Step 1: Fetching Order Data...');
                const response = await fetch(CONFIG.PAYMENT_INITIATE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || 'dummy-token'
                    },
                    body: JSON.stringify({ order_id: parseInt(orderId), platform: CONFIG.PLATFORM })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const result = await response.json();

                if (result.status === 'success') {
                    console.log('Step 2: Order Data Received:', result.data);

                    // Show order details
                    if (typeof orderDetails !== 'undefined' && orderDetails) {
                        orderDetails.style.display = 'block';
                    }

                    updateStatus('payment', 'Opening Payment Gateway', 'Redirecting to secure payment...');

                    // 2. Load Razorpay Script
                    console.log('Step 3: Loading Razorpay SDK...');
                    const scriptLoaded = await loadRazorpayScript();

                    if (!scriptLoaded) {
                        throw new Error('Razorpay SDK failed to load. Check internet connection.');
                    }

                    // 3. Open Checkout with Guaranteed Data
                    console.log('Step 4: Opening Checkout...');
                    openRazorpayCheckout(result.data, result.payment_id);

                } else {
                    showError(result.message || 'Failed to initialize payment');
                }
            } catch (error) {
                console.error('Payment initiation error:', error);
                showError('Unable to connect to payment server. Please check your internet connection and try again.');
            }
        }

        function openRazorpayCheckout(paymentData, paymentId) {
            // Round amount to whole number (Razorpay expects amount in paise, already converted on backend)
            const roundedAmount = Math.round(paymentData.amount);

            // Detect mobile devices and app environment
            const isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // Detect if running inside native app (WebView)
            const isApp = !!window.AndroidInterface || !!window.ReactNativeWebView || 
                         (window.webkit && window.webkit.messageHandlers) ||
                         window.location.search.includes('webview=true') ||
                         window.location.search.includes('platform=android');

            const options = {
                key: paymentData.key,
                amount: roundedAmount,
                currency: "INR",
                name: "Kirazee",
                description: paymentData.description,
                image: "{{ BASE_URL }}/kirazee/media/default_images/k1.png",
                order_id: paymentData.order_id,
                redirect: true,
                webview_intent: true,
                // Explicitly Enable Payment Methods (Vital for First Load)
                method: {
                    upi: true,
                    card: true,
                    netbanking: true,
                    wallet: true
                },

                handler: function (response) {
                    handlePaymentSuccess(response, paymentId);
                },
                prefill: paymentData.prefill,
                theme: paymentData.theme,
                modal: {
                    ondismiss: function () {
                        handlePaymentDismiss();
                    },
                    confirm_close: true,
                    animation: true
                },
                retry: {
                    enabled: true,
                    max_count: 3
                },
                timeout: 300, // 5 minutes timeout
                remember_customer: false
            };

            // Force mobile view for mobile devices
            if (isMobile) {
                // GENERIC UPI INTENT CONFIG - Forces upi:// instead of gpay://, phonepe://
                options.config = {
                    display: {
                        language: 'en',
                        blocks: {
                            upi: {
                                name: "Pay via UPI",
                                instruments: [
                                    {
                                        method: "upi",
                                        // This forces the generic 'upi://' intent 
                                        // instead of app-specific ones like 'gpay://'
                                        apps: ["google_pay", "phonepe", "paytm", "bhim", "all"]
                                    }
                                ]
                            },
                            other: {
                                name: "Other Payment Methods",
                                instruments: [
                                    { method: "card" },
                                    { method: "netbanking" },
                                    { method: "wallet" }
                                ]
                            }
                        },
                        sequence: ["block.upi", "block.other"],
                        preferences: {
                            show_default_blocks: true
                        }
                    }
                };

                // Enhanced external apps configuration for WebView
                options.external = {
                    wallets: true,
                    upi: true,
                    card: true,
                    netbanking: true
                };

                // Additional WebView-specific settings
                if (isApp) {
                    console.log(' Detected App Environment - Using Generic UPI Intent');
                    
                    // Force generic UPI intent for apps
                    options.config.display.blocks.upi.instruments[0].flow = "intent";
                    options.config.display.blocks.upi.instruments[0].intent_type = "generic";
                    
                    // Ensure UPI is the primary payment method in apps
                    options.config.display.sequence = ["block.upi", "block.other"];
                    options.config.display.preferences.show_default_blocks = true;
                }

                options.modal = {
                    confirm_close: true,
                    ondismiss: function () {
                        handlePaymentDismiss();
                    },
                    escape: false,
                    backdropclose: false
                };
            }

            try {
                console.log('Initializing Razorpay with amount:', options.amount, 'order_id:', options.order_id);

                // Script is now guaranteed to be loaded
                const rzp = new Razorpay(options);

                rzp.on('payment.failed', function (response) {
                    handlePaymentFailure(response);
                });

                // No delay needed - Data is ready
                rzp.open();

            } catch (error) {
                console.error('Razorpay initialization error:', error);
                showError('Payment gateway initialization failed. Please try again.');
            }
        }

        async function handlePaymentSuccess(response, paymentId) {
            // Use the verify payment endpoint instead of success callback
            await verifyPayment(response.razorpay_payment_id, response.razorpay_order_id, response.razorpay_signature);
        }

        async function handlePaymentFailure(response) {
            console.error('Payment failed:', response);

            const errorMsg = response.error?.description || 'Payment failed. Please try again.';

            try {
                await fetch(CONFIG.PAYMENT_FAILURE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        razorpay_order_id: response.error?.metadata?.order_id,
                        error_description: errorMsg
                    })
                });
            } catch (error) {
                console.error('Error reporting payment failure:', error);
            }

            showError(errorMsg);
        }

        async function handlePaymentDismiss() {
            // Update order status to cancelled when payment is dismissed
            const orderId = getOrderIdFromUrl();
            if (orderId && orderId !== 'N/A') {
                try {
                    await fetch(`${CONFIG.ORDERS_URL}${orderId}/status/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken') || 'dummy-token'
                        },
                        body: JSON.stringify({
                            user_id: 14774, // This should ideally come from user session
                            action: "cancelled"
                        })
                    });
                } catch (error) {
                    console.error('Failed to update order status to cancelled:', error);
                }
            }

            showError('Payment was cancelled. You can try again or contact support if you need help.');
        }

        // Utility function to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Initialize payment flow when page loads
        document.addEventListener('DOMContentLoaded', function () {
            // Get order ID from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');

            // Optimized flow guarantees fresh context without hard reload

            if (!orderId) {
                showError('Order ID is missing. Please try again from your orders page.');
                return;
            }

            // Check if there's an error from server (passed from Django template)
            const serverError = document.querySelector('.error-message');
            if (serverError) {
                const errorText = serverError.textContent.replace('Error: ', '');
                showError(errorText);
                return;
            }

            // Start payment flow
            initiatePaymentOnServer(orderId);
        });

        // Handle browser back button
        window.addEventListener('beforeunload', function (e) {
            // Only show warning if payment is in progress
            if (paymentStatus.querySelector('.status-icon').classList.contains('loading')) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // WebView specific handling
        if (window.ReactNativeWebView) {
            // Handle messages from React Native
            window.addEventListener('message', function (event) {
                if (event.data.type === 'PAYMENT_SUCCESS') {
                    handlePaymentSuccess(event.data.response, event.data.paymentId);
                } else if (event.data.type === 'PAYMENT_FAILURE') {
                    handlePaymentFailure(event.data.response);
                }
            });
        }
    </script>
    </body>

</html>
