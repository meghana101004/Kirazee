<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Complete Business Setup Payment - Kirazee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe0b3 25%, #ffcc80 50%, #f55d00 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .payment-container {
            background: #ffffff;
            border-radius: 16px;
            border-top: 4px solid #f55d00;
            max-width: 400px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .payment-container.error-state {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #f55d00;
            letter-spacing: -0.8px;
            margin-bottom: 40px;
        }

        .payment-status {
            margin-bottom: 40px;
        }

        .status-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.3),
                0 4px 12px rgba(245, 93, 0, 0.2);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .status-icon::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: linear-gradient(90deg, rgba(245, 93, 0, 0.1), rgba(255, 138, 0, 0.1));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-icon:hover::before {
            opacity: 1;
        }

        .status-icon.loading {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.3),
                0 4px 16px rgba(245, 93, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-icon.loading svg {
            fill: white;
        }

        .status-icon.success {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.3),
                0 4px 16px rgba(245, 93, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            animation: successPulse 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes successPulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .status-icon.success svg {
            fill: #1e293b;
        }

        .status-icon.error {
            background: #ef4444;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 12px 32px rgba(239, 68, 68, 0.3),
                0 4px 16px rgba(239, 68, 68, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .status-icon.error svg {
            fill: white;
        }

        .status-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
            letter-spacing: -0.5px;
            line-height: 1.3;
            animation: fadeInDown 0.6s ease-out 0.2s both;
        }

        .status-message {
            font-size: 16px;
            color: #334155;
            line-height: 1.5;
            font-weight: 400;
            margin-bottom: 32px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .progress-bar {
            width: 100%;
            max-width: 280px;
            height: 4px;
            background: #F4F4F8;
            border-radius: 2px;
            margin: 24px auto;
            overflow: hidden;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            border-radius: 2px;
            animation: progressMove 2s ease-in-out infinite;
        }

        @keyframes progressMove {
            0% {
                width: 0%;
            }

            50% {
                width: 70%;
            }

            100% {
                width: 100%;
            }
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }

        .progress-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(74, 144, 226, 0.3);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .progress-dots .dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        .progress-dots .dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {

            0%,
            100% {
                background: rgba(74, 144, 226, 0.3);
                transform: scale(1);
            }

            50% {
                background: #f55d00;
                transform: scale(1.2);
            }
        }

        .warning-message {
            background: transparent;
            color: #475569;
            padding: 0;
            border: none;
            margin: 16px auto 0;
            font-size: 14px;
            font-weight: 400;
            text-align: center;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 8px 4px;
            min-width: 160px;
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.3),
                0 2px 8px rgba(245, 93, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .btn:hover {
            background: linear-gradient(90deg, #ff8a00, #f55d00);
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.4),
                0 4px 16px rgba(245, 93, 0, 0.3);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
            border-radius: 28px 28px 0 0;
        }

        @keyframes shimmer {

            0%,
            100% {
                background-position: 200% 0;
            }

            50% {
                background-position: -200% 0;
            }
        }

        .error-container .status-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            background: rgba(239, 68, 68, 0.1);
            border: 3px solid rgba(239, 68, 68, 0.2);
            position: relative;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
            }
        }

        .error-container .status-icon::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ef4444, #f55d00, #ff8a00);
            background-size: 200% 200%;
            z-index: -1;
            opacity: 0.2;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
                background-position: 0% 50%;
            }

            50% {
                transform: rotate(180deg);
                background-position: 100% 50%;
            }

            100% {
                transform: rotate(360deg);
                background-position: 0% 50%;
            }
        }

        .error-container .status-icon svg {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 36px;
            flex-wrap: wrap;
            text-transform: none;
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        .btn-primary {
            background: linear-gradient(90deg, #f55d00, #ff8a00);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.35),
                0 2px 8px rgba(245, 93, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 160px;
            position: relative;
            overflow: hidden;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(245, 93, 0, 0.4);
            background: linear-gradient(90deg, #ff8a00, #f55d00);
        }

        .btn-secondary {
            background: rgba(248, 250, 252, 0.9);
            color: #1e293b;
            border: 2px solid rgba(30, 41, 59, 0.3);
            padding: 16px 36px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 160px;
            position: relative;
            overflow: hidden;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .btn-secondary:hover {
            color: rgb(255, 0, 0);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(245, 93, 0, 0.3);
            border-color: #f55d00;
            background: linear-gradient(90deg, #f55d00, #ff8a00);
        }

        .footer-text {
            font-size: 11px;
            color: #475569;
            opacity: 0.6;
            margin-top: 44px;
            text-align: center;
            font-weight: 400;
            animation: fadeIn 0.6s ease-out 1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 0.6;
            }
        }

        .security-info-error {
            font-size: 12px;
            color: #475569;
            opacity: 0.7;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        .security-info-error svg {
            width: 16px;
            height: 16px;
            fill: #f55d00;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 2px rgba(245, 93, 0, 0.3));
            }

            to {
                filter: drop-shadow(0 0 6px rgba(245, 93, 0, 0.6));
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.05);
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            border-left: 4px solid #ef4444;
            font-size: 14px;
        }

        .success-message {
            background: rgba(245, 93, 0, 0.1);
            color: #1e293b;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            border-left: 4px solid #f55d00;
            font-size: 14px;
        }

        /* Success State Styles */
        .success-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f55d00, #ff8a00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow:
                0 8px 32px rgba(245, 93, 0, 0.3),
                0 4px 16px rgba(245, 93, 0, 0.2);
            animation: successBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .success-icon-large svg {
            width: 32px;
            height: 32px;
        }

        @keyframes successBounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            line-height: 1.2;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .success-message {
            font-size: 14px;
            color: #334155;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.6s ease-out 0.4s both;
            background: none;
            border: none;
            padding: 0;
        }

        .success-btn {
            background: linear-gradient(135deg, #f55d00, #ff8a00);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 200px;
            box-shadow:
                0 4px 16px rgba(245, 93, 0, 0.3),
                0 2px 8px rgba(245, 93, 0, 0.2);
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        /* New Professional Success Page Styles */
        .success-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        .success-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(245, 93, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .success-header {
            text-align: center;
            margin-bottom: 40px;
            z-index: 1;
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .success-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 24px rgba(0, 0, 0, 0.04);
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .success-icon-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .success-icon {
            position: relative;
            z-index: 2;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }

        .success-icon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 3px solid #10b981;
            border-radius: 50%;
            opacity: 0.2;
            animation: pulseRing 2s ease-in-out infinite;
        }

        .success-content {
            text-align: center;
            margin-bottom: 40px;
        }

        .success-subtitle {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out 0.5s both;
        }

        .business-details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        .detail-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .detail-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-color: #cbd5e1;
        }

        .detail-icon {
            width: 48px;
            height: 48px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .detail-content {
            flex: 1;
        }

        .detail-label {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 10px;
            color: #0062ff;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: #10b981;
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .next-steps {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out 0.7s both;
        }

        .next-steps-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
            text-align: center;
        }

        .steps-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: #f55d00;
            color: white;

            align-items: center;
            justify-content: center;

        .step-text {

            line-height: 1.4;
        }

        .action-container {
            text-align: center;
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        .primary-action-btn {
            background: linear-gradient(135deg, #f55d00 0%, #ff8a00 100%);
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow:
                0 8px 24px rgba(245, 93, 0, 0.3),
                0 4px 12px rgba(245, 93, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .primary-action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .primary-action-btn:hover::before {
            left: 100%;
        }

        .primary-action-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 32px rgba(245, 93, 0, 0.4),
                0 6px 16px rgba(245, 93, 0, 0.3);
        }

        .success-footer {
            margin-top: 40px;
            text-align: center;
            z-index: 1;
        }

        /* Animations */
        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulseRing {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.1;
            }

            100% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);

    <script>
        // Enhanced Platform Detection
        function detectPlatform() {
            const urlParams = new URLSearchParams(window.location.search);
            const platformParam = urlParams.get('platform');

            // Check URL parameter first
            if (platformParam === 'android' || platformParam === 'webview') {
                return 'android';
            }
            if (platformParam === 'ios') {
                return 'ios';
            }

            // Check User Agent for WebView indicators
            const userAgent = navigator.userAgent.toLowerCase();
            const isAndroidWebView = userAgent.includes('wv') ||
                userAgent.includes('version') && userAgent.includes('chrome') && userAgent.includes('mobile') ||
                window.AndroidInterface !== undefined ||
                window.androidInterface !== undefined;

            const isIOSWebView = /iPhone|iPad|iPod/.test(navigator.userAgent) &&
                (window.webkit?.messageHandlers !== undefined ||
                    window.iOSInterface !== undefined);

            if (isAndroidWebView) {
                return 'android';
            } else if (isIOSWebView) {
                return 'ios';
            }

            return 'web';
        }

        // Configuration
        const BASE_URL = window.location.protocol + '//' + window.location.host;
        const PLATFORM = detectPlatform();

        const CONFIG = {
            PAYMENT_SAVE_URL: BASE_URL + '/kirazee/business/save-business-payment-data/',
            PAYMENT_SUCCESS_URL: BASE_URL + '/kirazee/business/payment/success/',
            PAYMENT_CANCEL_URL: BASE_URL + '/kirazee/business/payment/cancel/',
            PLATFORM: PLATFORM
        };

        // DOM Elements
        const paymentStatus = document.getElementById('payment-status');

        // Utility Functions
        function updateStatus(iconType, title, message, type = 'loading') {
            const statusTitle = paymentStatus.querySelector('.status-title');
            const statusMessage = paymentStatus.querySelector('.status-message');
            statusTitle.textContent = title;
            statusMessage.textContent = message;

            // Add progress elements for loading state
            if (type === 'loading') {
                // Add progress bar if it doesn't exist
                if (!paymentStatus.querySelector('.progress-bar')) {
                    const progressBar = document.createElement('div');
                    progressBar.className = 'progress-bar';
                    paymentStatus.appendChild(progressBar);
                }
            }
        }

        function showError(message) {
            // Clear the payment status container and apply error state
            paymentStatus.innerHTML = '';
            document.querySelector('.payment-container').classList.add('error-state');

            // Hide the original security info
            const originalSecurityInfo = document.querySelector('.security-info');
            if (originalSecurityInfo) {
                originalSecurityInfo.style.display = 'none';
            }

            // Create the error UI structure matching order_payment.html exactly
            const errorContainer = document.createElement('div');
            errorContainer.className = 'error-container';

            // Error title
            const errorTitle = document.createElement('h2');
            errorTitle.className = 'status-title';
            errorTitle.textContent = 'Payment Failed';

            // Error message
            const errorMessage = document.createElement('p');
            errorMessage.className = 'status-message';
            errorMessage.textContent = message || 'Payment was cancelled. You can try again or contact support if you need help.';

            // Button container - side by side layout for error buttons
            const buttonContainer = document.createElement('div');
            buttonContainer.className = 'button-container';
            buttonContainer.style.cssText = 'display: flex; gap: 8px; justify-content: center; margin-top: 16px; width: 100%;';

            // Try Again button - responsive sizing
            const retryBtn = document.createElement('button');
            retryBtn.className = 'btn btn-primary';
            retryBtn.textContent = 'Try Again';
            retryBtn.style.cssText = 'flex: 1 1 0; max-width: 48%; padding: 12px 10px; font-size: 13px; min-width: 0 !important;';
            retryBtn.onclick = () => location.reload();

            // Back to Profile button - responsive sizing
            const backBtn = document.createElement('button');
            backBtn.className = 'btn btn-secondary';
            backBtn.id = 'backtoProfile';
            backBtn.textContent = 'Back To Profile';
            backBtn.style.cssText = 'flex: 1 1 0; max-width: 48%; padding: 12px 10px; font-size: 13px; min-width: 0 !important;';
            backBtn.onclick = () => handleRedirection('profile');

            // Assemble the error UI
            buttonContainer.appendChild(retryBtn);
            buttonContainer.appendChild(backBtn);

            // Footer text
            const footerText = document.createElement('div');
            footerText.className = 'footer-text';
            footerText.textContent = '© 2023 Kirazee. All rights reserved.';

            // Security info (below footer text)
            const securityInfo = document.createElement('div');
            securityInfo.className = 'security-info-error';
            securityInfo.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22S8 18 8 12V7L12 5L16 7V12C16 18 12 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Your payment is secured with 256-bit SSL encryption
            `;

            errorContainer.appendChild(errorTitle);
            errorContainer.appendChild(errorMessage);
            errorContainer.appendChild(buttonContainer);
            errorContainer.appendChild(footerText);
            errorContainer.appendChild(securityInfo);

            paymentStatus.appendChild(errorContainer);

            // Set global payment status for failure
            window.paymentSuccessStatus = {
                status: 'cancelled',
                timestamp: Date.now(),
                message: 'Payment Failed',
                business_id: getUrlParams().business_id
            };

            // Trigger Android JavaScript interface for failure detection
            setTimeout(() => {
                console.log('🚀 Attempting Android interface calls for failure...');

                // Try all possible interface names for failure
                if (window.androidInterface && typeof window.androidInterface.onPaymentResult === 'function') {
                    console.log('✅ Calling androidInterface.onPaymentResult (cancelled)');
                    window.androidInterface.onPaymentResult('cancelled', 'profile');

        async function loadBusinessDetails() {
            const params = getUrlParams();
            const userId = params.user_id;

            // Clear the payment status and show loading
            paymentStatus.innerHTML = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'status-message';
            loadingDiv.textContent = 'Loading business details...';
            loadingDiv.style.textAlign = 'center';
            loadingDiv.style.padding = '40px';
            paymentStatus.appendChild(loadingDiv);

            try {
                const response = await fetch(`/kirazee/business/user-status/?userID=${userId}`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.stage === 'COMPLETE' && data.status === 'ACTIVE') {
                    displayBusinessDetails(data);
                } else {
                    throw new Error('Business not ready yet');
                }
            } catch (error) {
                console.error('Error fetching business details:', error);
                paymentStatus.innerHTML = `
                    <div class="error-message">
                        <strong>Error:</strong> Failed to load business details. 
                        <button class="btn" onclick="handleRedirection('profile')" style="margin-top: 15px;">
                            Go to Profile
                        </button>
                    </div>
                `;
            }
        }

            const hasAndroidInterface = window.androidInterface || window.AndroidInterface;

            console.log('Device detection:', {
                userAgent: userAgent,
                isAndroid: isAndroid,

                hasAndroidInterface: !!hasAndroidInterface,
                hasIOSInterface: !!hasIOSInterface
            });

            return {
                isWebView: hasAndroidInterface || hasIOSInterface,
                isAndroid: isAndroid,
                isIOS: isIOS,
                hasAndroidInterface: !!hasAndroidInterface,
                hasIOSInterface: !!hasIOSInterface,
                platform: hasAndroidInterface ? 'android' : (hasIOSInterface ? 'ios' : 'web')
            };

        // Send payment result to backend
        async function sendPaymentResultToBackend(response, status) {
            try {
                const params = getUrlParams();

                // Use fetch instead of form submission to avoid redirect
                const formData = new FormData();

                // Add all required fields
                const fields = {
                    user_id: params.user_id,
                    business_id: params.business_id,
                    amount: params.amount,
                    payment_id: response.razorpay_payment_id,
                    order_id: response.razorpay_order_id,
                    signature: response.razorpay_signature,
                    status: status,
                    payment_method: 'razorpay',
                    platform: CONFIG.PLATFORM
                };

                for (const [key, value] of Object.entries(fields)) {
                    formData.append(key, value);
                }

                // Add CSRF token
                formData.append('csrfmiddlewaretoken', getCookie('csrftoken') || 'dummy-token');

                // Submit using fetch to avoid redirect
                const fetchResponse = await fetch(CONFIG.PAYMENT_SAVE_URL, {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                });

                if (fetchResponse.ok) {
                    console.log('Payment data saved successfully');
                    return { success: true, form_submitted: true };
                } else {
                    console.error('Failed to save payment data:', fetchResponse.status);
                    return { success: false, form_submitted: false };
                }

            } catch (error) {
                console.error('Error submitting payment data:', error);
                return { success: false, form_submitted: false };
            }
        }

        // Utility function to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

                });
            }

            // Add manual Android trigger button if interface not detected after 10 seconds
            setTimeout(function () {
                if (!window.androidInterfaceDetected && window.paymentSuccessStatus && window.paymentSuccessStatus.status === 'success') {
                    console.log('⚠️ Android interface not detected after 10 seconds - adding manual trigger');

                    const successContainer = document.querySelector('.success-container') || document.querySelector('.payment-container');
                    if (successContainer) {
                        const manualTrigger = document.createElement('div');
                        manualTrigger.style.cssText = `
                            position: fixed;
                            bottom: 20px;
                            right: 20px;
                            background: #f55d00;
                            color: white;
                            padding: 12px 20px;
                            border-radius: 8px;
                            cursor: pointer;
                            font-size: 14px;
                            font-weight: 600;
                            box-shadow: 0 4px 12px rgba(245, 93, 0, 0.3);
                            z-index: 10000;
                            animation: pulse 2s infinite;
                        `;
                        manualTrigger.innerHTML = '📱 Notify Android App';
                        manualTrigger.onclick = function () {
                            console.log('🔔 Manual Android trigger clicked');

                            // Try all possible interfaces
                            if (window.androidInterface && typeof window.androidInterface.onPaymentSuccess === 'function') {
                                window.androidInterface.onPaymentSuccess(window.paymentSuccessStatus.payment_id || 'success');
                            } else if (window.AndroidInterface && typeof window.AndroidInterface.onPaymentSuccess === 'function') {
                                window.AndroidInterface.onPaymentSuccess(window.paymentSuccessStatus.payment_id || 'success');
                            } else if (window.PaymentBridge && typeof window.PaymentBridge.onPaymentSuccess === 'function') {
                                window.PaymentBridge.onPaymentSuccess(window.paymentSuccessStatus.payment_id || 'success');
                            }

                            // Hide the trigger button
                            manualTrigger.style.display = 'none';
                        };

                        successContainer.appendChild(manualTrigger);
                    }
                }
            }, 10000);
        });

        // Function to trigger native app navigation when on home page
        function triggerNativeNavigation(type) {
            const webviewInfo = detectWebView();

            if (webviewInfo.isWebView) {
                try {
                    // Try Android Interface first
                    if (webviewInfo.hasAndroidInterface) {
                        if (window.AndroidInterface && window.AndroidInterface.handleRedirection) {
                            window.AndroidInterface.handleRedirection(type);
                            return;
                        }
                        if (window.androidInterface && window.androidInterface.handleRedirection) {
                            window.androidInterface.handleRedirection(type);
                            return;
                        }
                    }

                    // Try WebKit message handler (for iOS/hybrid apps)
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.redirection) {
                        window.webkit.messageHandlers.redirection.postMessage({
                            type: type,
                            data: {}
                        });
                        return;
                    }

                    // Fallback to custom URL scheme
                    const customUrl = `kirazee://payment/${type}`;
                    window.location.href = customUrl;

                } catch (error) {
                    console.error('Native navigation failed:', error);
                }
            }
        }
    </script>
