<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing - Kirazee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f55d00 0%, #ff8a00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .callback-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(245, 93, 0, 0.3);
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f55d00, #ff8a00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: successPulse 0.6s ease-out;
        }
        
        @keyframes successPulse {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
        }
        
        p {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .loading-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f55d00;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        
        .loading-dots .dot:nth-child(2) {
            animation-delay: 0.3s;
        }
        
        .loading-dots .dot:nth-child(3) {
            animation-delay: 0.6s;
        }
        
        @keyframes dotPulse {
            0%, 100% { 
                opacity: 0.3;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <h1>Payment Successful!</h1>
        <p>Your business setup payment has been processed successfully. Redirecting you back to the app...</p>
        
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Platform Detection
        function detectPlatform() {
            const userAgent = navigator.userAgent.toLowerCase();
            const isAndroidWebView = userAgent.includes('wv') || 
                                   userAgent.includes('version') && userAgent.includes('chrome') && userAgent.includes('mobile') ||
                                   window.AndroidInterface !== undefined ||
                                   window.webkit?.messageHandlers !== undefined;
            return isAndroidWebView ? 'android' : 'web';
        }

        // Call Android callback function
        function handlePaymentCallback() {
            const platform = detectPlatform();
            const status = '{{ status|default:"success" }}';
            const destination = 'dashboard';
            const userId = '{{ user_id|default:"" }}';
            const businessId = '{{ business_id|default:"" }}';
            const paymentId = '{{ payment_id|default:"" }}';

            console.log('Payment callback:', {
                status: status,
                destination: destination,
                userId: userId,
                businessId: businessId,
                paymentId: paymentId,
                platform: platform
            });

            if (platform === 'android') {
                // Try different Android interface variations
                if (window.androidInterface && typeof window.androidInterface.onPaymentResult === 'function') {
                    console.log('Calling androidInterface.onPaymentResult');
                    window.androidInterface.onPaymentResult(status, destination);
                } else if (window.AndroidInterface && typeof window.AndroidInterface.onPaymentResult === 'function') {
                    console.log('Calling AndroidInterface.onPaymentResult');
                    window.AndroidInterface.onPaymentResult(status, destination);
                } else {
                    console.error('Android interface not found');
                    // Fallback: try to close the WebView
                    if (window.androidInterface && typeof window.androidInterface.close === 'function') {
                        window.androidInterface.close();
                    } else if (window.AndroidInterface && typeof window.AndroidInterface.close === 'function') {
                        window.AndroidInterface.close();
                    }
                }
            } else {
                // For web browsers, redirect to user-status
                if (userId) {
                    window.location.href = `/kirazee/business/user-status/?userID=${userId}`;
                } else {
                    window.location.href = '/kirazee/business/user-status/';
                }
            }
        }

        // Execute callback immediately when page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Small delay to ensure the page is fully rendered
            setTimeout(handlePaymentCallback, 500);
        });

        // Also try to call callback immediately in case DOMContentLoaded already fired
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', handlePaymentCallback);
        } else {
            setTimeout(handlePaymentCallback, 100);
        }
    </script>
</body>
</html>
